server:
  port: 9090

spring:

  application:
    name: authServer

  #  Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres-db
    password: admin
    username: admin
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  #Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9090/oauth2/jwks
      authorization-server:
        issuer-uri: http://localhost:9090

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      #      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Cloud Configuration
  cloud:
    vault:
      enabled: true
      uri: http://localhost:8200
      token: myroot
      authentication: TOKEN
      kv:
        enabled: false
        backend: secret
        default-context: ${spring.application.name}
        kv-version: 2
      generic:
        enabled: false

vault:
  enabled: false

# OAuth2 JWT Configuration
oauth2:
  jwt:
    key-id: authserver-key-2025
    vault-path: secret/data/oauth2/jwt-keys

# Expiration Time Configuration
storage:
  expiration-time:
    initialize: 15
    phone-number: 10
    otp: 5
    rate-limit: 1
    lock-account: 15
    failed-attempts: 3
    auth-code: 10

logging:
  level:
    root: info
    web: debug
    org:
      springframework:
        security: debug

# Swagger Configuration
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: true
  api-docs:
    enabled: true
    path: /v3/api-docs

# Bundle Configuration
config:
  language: fa