server:
  port: 9090

spring:

  application:
    name: authServer

  #  Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres-db
    password: admin
    username: admin
    hikari:

      # Core Settings
      maximum-pool-size: 20          # Good balance for OAuth2 server
      minimum-idle: 5                # Keep 5 connections warm
      connection-timeout: 20000      # 20 seconds timeout
      idle-timeout: 300000           # Close idle connections after 5 min
      max-lifetime: 1800000          # Recycle connections after 30 min

      # Health & Monitoring
      leak-detection-threshold: 60000   # Detect connection leaks
      connection-test-query: SELECT 1   # PostgresSQL health check

      # Naming
      pool-name: AuthServerHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

        # Performance tuning
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  #Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9090/oauth2/jwks
      authorization-server:
        issuer-uri: http://localhost:9090

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      #      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Cloud Configuration
  cloud:
    vault:
      enabled: true
      uri: http://localhost:8200
      token: myroot
      authentication: TOKEN
      kv:
        enabled: false
        backend: secret
        default-context: ${spring.application.name}
        kv-version: 2
      generic:
        enabled: false
vault:
  enabled: true

logging:
  level:
    root: info
    web: info
    org:
      springframework:
        security: info

# Swagger Configuration
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: true
  api-docs:
    enabled: true
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

app:

  # Admin
  adminPanel:
    clientId: AdminPanel
    clientSecret: kh3nd9as8
    redirectUri: http://localhost:9090/callback
    super-admin:
      username: superAdmin
      phone-number: 989331782513

  # Vault Configuration
  vault:
    key-id: authserver-key-2025
    vault-path: secret/data/oauth2/jwt-keys
    algorithm: RSA
    key-size: 2048

  # Expiration Time Configuration
  storage:
    expiration-time-min:
      initialize: 15
      phone-number: 10
      otp: 5
      rate-limit: 1
      lock-account: 15
      auth-code: 5
      blacklist-token: 30
    times:
      failed-attempts: 3
      max-otp-per-ip-per-hour: 10
      max-global-otp-per-minute: 100
      max-verification-attempts-per-hour: 10

  cleanup:
    authorization:
      rate: 3600000
      cutoff: 1

  # Cors Configuration
  cors:
    allowed-origins: "http://localhost:5173"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
    allowed-headers: "*"
    exposed-headers: "X-XSRF-TOKEN,Authorization"
    allowed-credentials: "true"
    max-age: 3600

  # Bundle Configuration
  localization:
    language: fa