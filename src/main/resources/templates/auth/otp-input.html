<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Side Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .sms-icon {
            width: 60px;
            height: 60px;
            background: #e3f2fd;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .phone-display {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: 500;
            color: #333;
        }

        .otp-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .otp-digit {
            width: 50px;
            height: 50px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            transition: border-color 0.3s ease;
        }

        .otp-digit:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .resend-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }

        .resend-btn:disabled {
            color: #999;
            cursor: not-allowed;
            text-decoration: none;
        }

        .timer {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .back-link {
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
            }

            .otp-digit {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>

<body>
<div class="auth-container">
    <div class="logo">SP</div>
    <div class="sms-icon">📱</div>

    <h1>Enter OTP Code</h1>
    <p class="subtitle">We've sent a verification code to your phone</p>

    <div class="phone-display" th:text="${phoneNumber}">****6789</div>

    <div th:if="${param.error}" class="error" th:text="${param.error[0]}"></div>

    <form id="otpForm">
        <div class="otp-input-group">
            <input type="text" class="otp-digit" maxlength="1" data-index="0">
            <input type="text" class="otp-digit" maxlength="1" data-index="1">
            <input type="text" class="otp-digit" maxlength="1" data-index="2">
            <input type="text" class="otp-digit" maxlength="1" data-index="3">
            <input type="text" class="otp-digit" maxlength="1" data-index="4">
        </div>

        <input type="hidden" name="otp" id="otpValue">
        <button type="submit" class="submit-btn" id="verifyBtn" disabled>Verify OTP</button>
    </form>

    <div class="resend-section">
        <button type="button" class="resend-btn" id="resendBtn" disabled>Resend Code</button>
        <div class="timer" id="timer">Resend available in <span id="countdown">60</span> seconds</div>
    </div>

    <div class="back-link">
        <a href="/otp/enterPhoneNumber">← Use different phone number</a>
    </div>
</div>

<script>
    // OTP Input Logic
    const otpInputs = document.querySelectorAll('.otp-digit');
    const otpValue = document.getElementById('otpValue');
    const verifyBtn = document.getElementById('verifyBtn');
    const resendBtn = document.getElementById('resendBtn');
    const countdown = document.getElementById('countdown');

    let timer = 60;

    // OTP Input Handlers
    otpInputs.forEach((input, index) => {
        input.addEventListener('input', function(e) {
            const value = e.target.value.replace(/\D/g, '');
            e.target.value = value;

            if (value && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }

            updateOTP();
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                otpInputs[index - 1].focus();
            }

            if (e.key === 'ArrowLeft' && index > 0) {
                otpInputs[index - 1].focus();
            }

            if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text');
            const digits = paste.replace(/\D/g, '').split('');

            for (let i = 0; i < Math.min(digits.length, otpInputs.length); i++) {
                otpInputs[i].value = digits[i];
            }

            updateOTP();
        });
    });

    function updateOTP() {
        const otp = Array.from(otpInputs).map(input => input.value).join('');
        otpValue.value = otp;
        verifyBtn.disabled = otp.length !== 5;
    }

    // Handle form submission with JSON
    document.getElementById('otpForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if (otpValue.value.length !== 5) {
            alert('Please enter the complete 5-digit OTP code');
            return;
        }

        fetch('/otp/verifyOtp', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                otp: otpValue.value
            })
        })
            .then(response => {
                if (response.redirected) {
                    window.location.href = response.url;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to verify OTP. Please try again.');
            });
    });

    // Countdown Timer
    function startTimer() {
        const interval = setInterval(() => {
            timer--;
            countdown.textContent = timer;

            if (timer <= 0) {
                clearInterval(interval);
                resendBtn.disabled = false;
                document.getElementById('timer').style.display = 'none';
            }
        }, 1000);
    }

    // Resend OTP
    resendBtn.addEventListener('click', function() {
        // In a real implementation, this would make an AJAX call to resend OTP
        alert('Resend functionality would be implemented here');
        timer = 60;
        resendBtn.disabled = true;
        document.getElementById('timer').style.display = 'block';
        startTimer();
    });

    // Start timer and focus first input when page loads
    window.addEventListener('load', function() {
        otpInputs[0].focus();
        startTimer();
    });
</script>
</body>
</html>
