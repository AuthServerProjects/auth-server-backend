services:
  postgres:
    container_name: postgres-db
    image: postgres:16.0
    environment:
      POSTGRES_DB: postgres-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - db
    restart: unless-stopped

  redis:
    container_name: redis-cache
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - db
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  db:
    driver: bridge

volumes:
  db:
  redis_data:
